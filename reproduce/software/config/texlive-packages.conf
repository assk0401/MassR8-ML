# Notes
# -----
#
# - tex and fancyhdr: These two packages are installed along with the basic
#   installation scheme that we used to install tlmgr, they will be ignored
#   in the 'tlmgr install' command, but will be used later when we want
#   their versions.
#
# - fancyvrb: needed by R.
texlive-packages = biber \
                   biblatex \
                   bitset \
                   caption \
                   courier \
                   csquotes \
                   datetime \
                   ec \
                   etoolbox \
                   fancyhdr \
                   fancyvrb \
                   fmtcount \
                   fontaxes \
                   footmisc \
                   fp \
                   kastrup \
                   letltxmacro \
                   logreq \
                   mweights \
                   newtx \
                   pdfescape \
                   pdftexcmds \
                   pgf \
                   pgfplots \
                   preprint \
                   setspace \
                   tex \
                   tex-gyre \
                   times \
                   titlesec \
                   trimspaces \
                   txfonts \
                   ulem \
                   xcolor \
                   xkeyval \
                   xpatch \
                   xstring
